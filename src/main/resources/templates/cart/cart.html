<!DOCTYPE HTML>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{book/_layout}">
<head>
  <meta charset="UTF-8">
  <title>Edit Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
  <div class="container body-content">
    <h2>Giỏ hàng</h2>

    <table class="table table-striped mt-3">
      <thead>
      <tr>
        <th>Tên</th>
        <th>Giá</th>
        <th>Số lượng</th>
        <th>Tổng tiền</th>
        <th>Thao tác</th>
      </tr>
      </thead>
      <tbody>
      <tr th:if="${#lists.isEmpty(cartLines)}">
        <td colspan="5" class="text-center text-muted">Giỏ hàng đang trống.</td>
      </tr>
      <tr th:each="line : ${cartLines}">
        <td th:text="${line.book.name}"></td>
        <td th:text="${line.book.price}"></td>
        <td style="min-width: 220px;">
          <form th:action="@{/cart/update}" method="post" class="d-flex gap-2 align-items-center">
            <input type="hidden" name="bookId" th:value="${line.book.id}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="number" name="quantity" min="1" th:value="${line.quantity}" class="form-control form-control-sm" style="width: 120px;">
            <button type="submit" class="btn btn-primary btn-sm">Update</button>
          </form>
        </td>
        <td th:text="${line.lineTotal}"></td>
        <td>
          <form th:action="@{/cart/remove}" method="post">
            <input type="hidden" name="bookId" th:value="${line.book.id}"/>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-danger btn-sm">Remove</button>
          </form>
        </td>
      </tr>
      </tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center">
      <div class="fs-5">
        Tổng tiền: <span th:text="${totalAmount}"></span>
      </div>
      <div class="d-flex gap-2">
        <a th:href="@{/books}" class="btn btn-outline-secondary">Tiếp tục mua</a>
        <form th:action="@{/checkout}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <button type="submit" class="btn btn-success" th:disabled="${#lists.isEmpty(cartLines)}">
            Checkout
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
</body>
</html>
