<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{book/_layout}">
<head>
  <meta charset="UTF-8">
  <title>Edit Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card shadow border-0">
        <div class="card-header bg-primary text-white py-3">
          <h4 class="mb-0 fw-bold">Edit Book</h4>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/books/edit}" th:object="${book}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{id}" />
            <div class="mb-3">
              <label for="name" class="form-label">Book Name</label>
              <input class="form-control" type="text" th:field="*{name}" id="name" required>
              <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="mb-3">
              <label class="form-label">Current Image</label>
              <div class="mb-2">
                <img th:if="${book.image != null}" th:src="@{/images/{img}(img=${book.image})}" class="img-thumbnail" style="max-height:180px;">
                <div th:if="${book.image == null}" class="text-muted">No image uploaded</div>
              </div>
            </div>
            <div class="mb-3">
              <label for="imageBook" class="form-label">Replace Image</label>
              <input class="form-control" type="file" id="imageBook" name="imageBook" accept="image/png,image/jpeg">
              <div class="form-text">Leave empty to keep the current image.</div>
            </div>
            <div class="mb-3">
              <label for="price" class="form-label">Price</label>
              <div class="input-group">
                <span class="input-group-text">$</span>
                <input class="form-control" type="number" step="0.01" th:field="*{price}" id="price" required>
              </div>
              <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>
            <div class="mb-3">
              <label for="category" class="form-label">Category</label>
              <select th:field="*{category.id}" id="category" class="form-select" required>
                <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
              </select>
            </div>
            <div class="d-flex justify-content-end">
              <a th:href="@{/books}" class="btn btn-outline-secondary me-2">Cancel</a>
              <button type="submit" class="btn btn-primary">Update Book</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
