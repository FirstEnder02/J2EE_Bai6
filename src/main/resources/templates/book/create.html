<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{book/_layout}">
<head>
  <meta charset="UTF-8">
  <title>Add Book</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div layout:fragment="content" class="container body-content">
  <h2>Add Book</h2>
  <form th:action="@{/books/create}" th:object="${book}" method="post" enctype="multipart/form-data" class="form">
    <div class="form-group mb-3">
      <label for="name">Name</label>
      <input class="form-control" type="text" th:field="*{name}" id="name" placeholder="Book Name" required>
      <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
    </div>
    <div class="form-group mb-3">
      <label for="imageBook">Image</label>
      <div th:if="${preservedImage != null}" class="mb-2">
        <div class="alert alert-info alert-dismissible fade show" role="alert">
          <strong>Image uploaded:</strong> <span th:text="${preservedImage}"></span>
          <img th:src="@{/images/{img}(img=${preservedImage})}" class="img-thumbnail mt-2" style="max-height:150px;">
        </div>
      </div>
      <input class="form-control" type="file" id="imageBook" name="imageBook" accept="image/png,image/jpeg">
      <div class="form-text">Optional. Upload PNG or JPEG. Leave empty to skip.</div>
    </div>
    <div class="form-group mb-3">
      <label for="price">Price</label>
      <input class="form-control" type="number" th:field="*{price}" id="price" placeholder="Price" step="0.01" required>
      <div class="text-danger small mt-1" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
    </div>
    <div class="form-group mb-3">
      <label for="category">Category</label>
      <select th:field="*{category.id}" class="form-control" id="category" required>
        <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
      </select>
    </div>
    <button type="submit" class="btn btn-success">Add Book</button>
  </form>
</div>
</body>
</html>
