<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{book/_layout}">
<head>
  <meta charset="UTF-8">
  <title>Book List</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div layout:fragment="content">
  <div class="container body-content">
    <a th:href="@{/books/create}" class="btn btn-primary mb-3">Create New Book</a>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Id</th><th>Name</th><th>Image</th><th>Price</th><th>Category</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="book : ${books}">
          <th th:text="${book.id}"></th>
          <td th:text="${book.name}"></td>
          <td>
            <img th:if="${book.image != null}" th:src="@{/images/{img}(img=${book.image})}" alt="Book Image" class="img-thumbnail" style="height:120px;width:150px;">
          </td>
          <td th:text="${book.price}"></td>
          <td th:text="${book.category == null ? '' : book.category.name}"></td>
          <td>
            <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-secondary btn-sm">Edit</a>
            <form th:action="@{/books/delete/{id}(id=${book.id})}" method="post" style="display:inline;">
              <button type="submit" class="btn btn-danger btn-sm">Delete</button>
            </form>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
</body>
</html>
